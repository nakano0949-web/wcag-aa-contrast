<svg width="500" height="260" xmlns="http://www.w3.org/2000/svg">

  <text x="250" y="30" text-anchor="middle" font-size="18">Core Ratio Model</text>

  <!-- Stroke Width -->
  <rect x="80" y="80" width="340" height="40" fill="#cccccc" stroke="#666" stroke-width="2"/>
  <text x="250" y="105" text-anchor="middle" font-size="14">Stroke Width W</text>

  <!-- Core -->
  <rect x="160" y="80" width="180" height="40" fill="#000000" stroke="#333" stroke-width="2"/>
  <text x="250" y="105" text-anchor="middle" font-size="14" fill="#ffffff">Core Thickness C</text>

  <!-- Formula -->
  <text x="250" y="170" text-anchor="middle" font-size="16">
    Core Ratio = (C / W)²
  </text>
  <text x="250" y="200" text-anchor="middle" font-size="16">
    AA Impact = 1 − Core Ratio
  </text>

</svg>